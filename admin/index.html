<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastWin Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1f2937;--border:#2d3748;--text:#f1f5f9;--text2:#94a3b8;--accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--card:#111827;--sidebar:#0d1117;}
[data-theme="light"]{--bg:#f0f4ff;--bg2:#fff;--bg3:#e8edf5;--border:#d1d9e6;--text:#1a202c;--text2:#4a5568;--card:#fff;--sidebar:#1a1f35;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.sidebar{width:240px;background:var(--sidebar);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;border-right:1px solid rgba(245,158,11,0.2);z-index:100;transition:transform .3s;}
.brand{padding:18px 16px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;gap:10px;}
.brand-text{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#000;}
.brand-sub{font-size:10px;color:rgba(0,0,0,0.6);letter-spacing:2px;text-transform:uppercase;}
.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-sec{padding:8px 16px 4px;font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.ni{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
.ni:hover{background:rgba(245,158,11,0.08);color:var(--text);}
.ni.active{background:rgba(245,158,11,0.12);color:var(--accent);border-left-color:var(--accent);}
.ni .ic{font-size:17px;width:20px;text-align:center;}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}
.sfooter{padding:12px 8px;border-top:1px solid var(--border);}
.main{margin-left:240px;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);}
.ib{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ib:hover{border-color:var(--accent);color:var(--accent);}
.hbg{display:none;}
.page{display:none;padding:20px;}
.page.active{display:block;}
.tc{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;}
.th{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tt{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;background:var(--bg3);}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;}
.bp{background:rgba(245,158,11,0.15);color:var(--accent);}
.ba{background:rgba(16,185,129,0.15);color:var(--green);}
.br{background:rgba(239,68,68,0.15);color:var(--red);}
.bop{background:rgba(16,185,129,0.15);color:var(--green);}
.bcl{background:rgba(59,130,246,0.15);color:var(--blue);}
.btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:var(--accent);color:#000;}
.btn-r{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.btn-g{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
.btn-gh{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.scard{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:18px;}
.stitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;color:var(--accent);}
.toasts{position:fixed;top:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.toast{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;min-width:240px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.ts{background:rgba(16,185,129,0.95);color:#fff;}
.te{background:rgba(239,68,68,0.95);color:#fff;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}}
</style>
</head>
<body>
<div class="toasts" id="TC"></div>
<div class="mov" id="MOV" onclick="cSB()"></div>
<div id="loginPage" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;">
  <div style="text-align:center;width:100%;max-width:380px;">
    <h1 style="font-family:Rajdhani;color:var(--accent);font-size:34px;">FASTWIN</h1>
    <div style="background:var(--card);padding:28px;border-radius:14px;margin-top:20px;border:1px solid var(--border);">
      <input type="text" id="LU" placeholder="Username" style="width:100%;padding:12px;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:9px;">
      <input type="password" id="LP" placeholder="Password" style="width:100%;padding:12px;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:9px;">
      <button class="lbtn" onclick="doLogin()" style="width:100%;padding:13px;background:var(--accent);border:none;border-radius:9px;font-weight:bold;cursor:pointer;">LOGIN</button>
      <div id="LE" style="color:var(--red);margin-top:10px;"></div>
    </div>
  </div>
</div>

<div class="sidebar" id="SB">
  <div class="brand"><div class="brand-text">FASTWIN</div></div>
  <div class="nav">
    <div class="ni active" onclick="SP('dashboard',this)"><span class="ic">📊</span>Dashboard</div>
    <div class="ni" onclick="SP('deposits',this)"><span class="ic">💰</span>Deposits</div>
    <div class="ni" onclick="SP('withdrawals',this)"><span class="ic">🏧</span>Withdrawals</div>
    <div class="ni" onclick="SP('markets',this)"><span class="ic">🕐</span>Markets</div>
    <div class="ni" onclick="SP('results',this)"><span class="ic">🎲</span>Results</div>
    <div class="ni" onclick="SP('users',this)"><span class="ic">👥</span>Users</div>
    <div class="ni" onclick="SP('payments',this)"><span class="ic">💳</span>Payment Methods</div>
    <div class="ni" onclick="SP('rates',this)"><span class="ic">⚙️</span>Rates</div>
    <div class="ni" onclick="SP('settings',this)"><span class="ic">🔧</span>Settings</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="ib hbg" onclick="tSB()">☰</button>
      <div class="topbar-title" id="PT">📊 Dashboard</div>
    </div>
  </div>
    <div id="dashboard" class="page active">
    <div class="tc"><div class="th"><div class="tt">⏳ Pending Actions</div></div>
      <table><tbody id="DD"></tbody></table>
    </div>
  </div>

  <div id="deposits" class="page"><div class="tc"><div class="th"><div class="tt">💰 Deposits</div></div><table id="DT"></table></div></div>
  <div id="withdrawals" class="page"><div class="tc"><div class="th"><div class="tt">🏧 Withdrawals</div></div><table id="WT"></table></div></div>
  <div id="markets" class="page"><div class="tc"><div class="th"><div class="tt">🕐 Markets</div></div><table id="MT"></table></div></div>
  <div id="users" class="page"><div class="tc"><div class="th"><div class="tt">👥 Users</div></div><table id="UT"></table></div></div>

  <div id="payments" class="page">
    <div class="scard">
      <div class="stitle">💳 Payment Methods</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="btn btn-p" onclick="addPayment('upi')">➕ Add UPI</button>
        <button class="btn btn-b" onclick="addPayment('bank')">➕ Add Bank</button>
      </div>
      <div class="tc">
        <table>
          <thead><tr><th>Type</th><th>Name</th><th>Details</th><th>Extra</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="PMT"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="settings" class="page"><div class="scard">🔧 Admin Settings</div></div>
</div>
<script>
let TK=localStorage.getItem('at');
const PT2={dashboard:'📊 Dashboard',deposits:'💰 Deposits',withdrawals:'🏧 Withdrawals',markets:'🕐 Markets',results:'🎲 Results',users:'👥 Users',payments:'💳 Payment Methods',rates:'⚙️ Rates',settings:'🔧 Settings'};

function SP(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(el)el.classList.add('active');
  document.getElementById('PT').textContent=PT2[name]||name;
  const fn={dashboard:lDB,payments:loadPayments};
  if(fn[name])fn[name]();
}

async function A(path,method='GET',body=null){
  const o={method,headers:{Authorization:`Bearer ${TK}`,'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(`/api/admin${path}`,o);
  return r.json();
}

async function loadPayments() {
  const container = document.getElementById('PMT');
  container.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">Loading...</td></tr>';
  const rows = await A('/payments'); 
  const methods = Array.isArray(rows) ? rows : [];
  container.innerHTML = methods.map(m => `
    <tr>
      <td><span class="badge ${m.type==='upi'?'bop':'bcl'}">${m.type.toUpperCase()}</span></td>
      <td><b>${m.name}</b></td>
      <td><code style="color:var(--accent)">${m.value}</code></td>
      <td>${m.extra || '—'}</td>
      <td><span class="badge ${m.is_active ? 'ba' : 'br'}">${m.is_active ? 'Active' : 'Inactive'}</span></td>
      <td>
        <button class="btn ${m.is_active ? 'btn-r' : 'btn-g'}" onclick="togglePayment(${m.id}, ${m.is_active})">${m.is_active?'Disable':'Enable'}</button>
        <button class="btn btn-gh" onclick="deletePayment(${m.id})">🗑️</button>
      </td>
    </tr>`).join('');
}

async function addPayment(type) {
  let name = prompt('Name:'), value = prompt(type==='upi'?'UPI ID:':'Account Number:');
  if(!name || !value) return;
  const res = await A('/payments', 'POST', { type, name, value, extra: type==='bank'?'Bank Details':'' });
  if(res.success) { T('Added!'); loadPayments(); }
}

async function togglePayment(id, current) {
  await A(`/payments/${id}/toggle`, 'POST');
  loadPayments();
}

async function deletePayment(id) {
  if(confirm('Delete?')) { await A(`/payments/${id}`, 'DELETE'); loadPayments(); }
}

function lDB(){ console.log("Dashboard Loaded"); }
function T(msg,type='success'){ alert(msg); }
if(TK){document.getElementById('loginPage').style.display='none';}
</script>
</body>
</html>
